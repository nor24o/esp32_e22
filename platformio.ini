; =============================================================================
; Unified LoRa Tank System
;
; SHARED:  include/protocol.hpp  — packet structs, node IDs, RF settings
;
; TARGETS:
;   ttgo_lora_test  — TTGO LoRa32 V1.0 (ESP32 + SX1276)  on COM2
;                     Acts as gateway (0x01) + pond node (0x03) simultaneously
;                     Web dashboard at http://192.168.4.1
;   esp32s3dev      — Tank controller node (ESP32-S3 + SX1262 E22)  on COM3
;
; Build:   pio run -e ttgo_lora_test
;          pio run -e esp32s3dev
; Upload:  pio run -e ttgo_lora_test -t upload
;          pio run -e esp32s3dev -t upload
; Monitor: pio device monitor -e ttgo_lora_test
;          pio device monitor -e esp32s3dev
; =============================================================================

[platformio]
default_envs = ttgo_lora_test

; ── Shared RadioLib (needed by all envs) ─────────────────────────────────────
[common_radio]
lib_deps =
    jgromes/RadioLib @ ^6.6.0

; ── Tank node shared settings ─────────────────────────────────────────────────
[common_tank]
lib_deps =
    jgromes/RadioLib @ ^6.6.0
    fastled/FastLED @ ^3.6.0
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DRADIOLIB_DEBUG_LEVEL=0
    -DFASTLED_INTERNAL
build_src_filter = -<*> +<tank/>

; =============================================================================
; TTGO LoRa32 V1.0  —  gateway + pond node test board
; =============================================================================
[env:ttgo_lora_test]
platform         = espressif32
board            = ttgo-lora32-v1
framework        = arduino
upload_port      = COM2
monitor_speed    = 115200
build_src_filter = -<*> +<ttgo_test/>
lib_deps         =
    jgromes/RadioLib @ ^6.6.0
    https://github.com/mathieucarbou/ESPAsyncWebServer.git
    https://github.com/mathieucarbou/AsyncTCP.git
build_flags      =
    -DCORE_DEBUG_LEVEL=0
    -DRADIOLIB_DEBUG_LEVEL=0

; =============================================================================
; Tank node  —  ESP32-S3 DevKitC-1 (production target)
; =============================================================================
[env:esp32s3dev]
platform         = espressif32
board            = esp32-s3-devkitc-1
framework        = arduino
upload_port      = COM3
monitor_speed    = 115200
lib_deps         = ${common_tank.lib_deps}
build_src_filter = ${common_tank.build_src_filter}
build_flags      =
    ${common_tank.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_IDF_TARGET_ESP32S3=1
    -DUSB_SERIAL

