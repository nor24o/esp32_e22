; PlatformIO Project Configuration File
; Tank Controller Node (0x02) - ESP32 + SX1262 LoRa
; Target: ESP32 Xtensa Dual-Core (esp32dev)
; NOTE: Board changed from seeed_xiao_esp32c3 — the specified pin map
;       (GPIO 34-39 float switches, dual-core task pinning) requires the
;       full ESP32 Xtensa SoC, not the single-core RISC-V ESP32-C3.

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200

lib_deps =
    jgromes/RadioLib @ ^6.6.0
    fastled/FastLED @ ^3.6.0
    thomasfredericks/Bounce2 @ ^2.71.0
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DRADIOLIB_DEBUG_LEVEL=0
    -DFASTLED_INTERNAL
