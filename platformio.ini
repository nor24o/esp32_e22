; PlatformIO Project Configuration File
; Tank Controller Node (0x02) - ESP32 + SX1262 LoRa
; Targets: ESP32 Xtensa Dual-Core (esp32dev) and ESP32-S3 (esp32s3dev)
; NOTE: Board changed from seeed_xiao_esp32c3 — the specified pin map
;       (GPIO 34-39 float switches, dual-core task pinning) requires the
;       full ESP32 Xtensa SoC, not the single-core RISC-V ESP32-C3.

[common]
lib_deps =
    jgromes/RadioLib @ ^6.6.0
    fastled/FastLED @ ^3.6.0
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DRADIOLIB_DEBUG_LEVEL=0
    -DFASTLED_INTERNAL
    -DUSB_SERIAL

[env:esp32dev]
platform         = espressif32
board            = esp32dev
framework        = arduino
monitor_speed    = 115200
lib_deps         = ${common.lib_deps}
build_flags      = ${common.build_flags}
build_src_filter = +<tank/>

[env:esp32s3dev]
platform         = espressif32
board            = esp32-s3-devkitc-1
framework        = arduino
monitor_speed    = 115200
lib_deps         = ${common.lib_deps}
build_src_filter = +<tank/>
build_flags      =
    ${common.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1

; =============================================================================
; TTGO LoRa32 V1.0 — gateway communication test
;   Chip  : ESP32 (Xtensa dual-core)
;   Radio : SX1276 (HPD13A module on the TTGO board)
;   Role  : acts as NODE_GATEWAY (0x01) to talk to the tank controller node
;   Build : pio run -e ttgo_lora_test
;   Upload: pio run -e ttgo_lora_test -t upload
;   Monitor: pio device monitor -e ttgo_lora_test
; =============================================================================
[env:ttgo_lora_test]
platform         = espressif32
board            = ttgo-lora32-v1
framework        = arduino
monitor_speed    = 115200
build_src_filter = +<ttgo_test/>
lib_deps         =
    jgromes/RadioLib @ ^6.6.0
    me-no-dev/ESPAsyncWebServer @ ^1.2.3
    me-no-dev/AsyncTCP @ ^1.1.1
build_flags      =
    -DCORE_DEBUG_LEVEL=0
    -DRADIOLIB_DEBUG_LEVEL=0
